services:
  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: maintenance
      DOCKER_INFLUXDB_INIT_PASSWORD: maintenance-demo-password
      DOCKER_INFLUXDB_INIT_ORG: portfolio
      DOCKER_INFLUXDB_INIT_BUCKET: maintenance
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: portfolio-maintenance-token
    volumes:
      - influxdb-data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana:/var/lib/grafana/dashboards

volumes:
  influxdb-data:
  grafana-data:
