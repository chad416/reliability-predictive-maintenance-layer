name: CI

on:
  push:
    branches: ["master"]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate predictive-maintenance layer
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall src tests scripts

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Generate demo evidence
        run: python scripts/run_demo.py

      - name: Validate generated dashboard payload
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          html = Path("dashboard/index.html").read_text(encoding="utf-8")
          match = re.search(r"const data = (.*?);\n", html)
          assert match, "dashboard data payload not found"
          payload = json.loads(match.group(1))
          assert len(payload["scored"]) >= 200
          assert len(payload["alerts"]) >= 50
          assert len(payload["recommendations"]) >= 4
          print(
              {
                  "scored_windows": len(payload["scored"]),
                  "alert_windows": len(payload["alerts"]),
                  "recommendations": len(payload["recommendations"]),
              }
          )
          PY

      - name: Upload demo evidence
        uses: actions/upload-artifact@v4
        with:
          name: predictive-maintenance-demo-evidence
          path: |
            dashboard/index.html
            reports/maintenance_case_report.md
            output/demo/*.csv
            output/demo/*.json
            output/demo/*.lp
