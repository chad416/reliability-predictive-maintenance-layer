name: Publish Portfolio Dashboard

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static portfolio site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Generate latest demo evidence
        run: python scripts/run_demo.py

      - name: Generate online-monitor evidence
        run: python -m rpm_layer.cli monitor --chunk-size 997 --out-dir output/live

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Assemble Pages artifact
        run: |
          mkdir -p public/evidence public/docs/adr public/docs/assets
          cp dashboard/index.html public/index.html
          cp reports/maintenance_case_report.md public/evidence/maintenance_case_report.md
          cp output/demo/alert_episodes.csv public/evidence/alert_episodes.csv
          cp output/demo/recommendations.csv public/evidence/recommendations.csv
          cp output/demo/validation_summary.csv public/evidence/validation_summary.csv
          cp output/demo/confusion_matrix.csv public/evidence/confusion_matrix.csv
          cp output/demo/validation_metrics.json public/evidence/validation_metrics.json
          cp output/demo/data_quality.json public/evidence/data_quality.json
          cp output/demo/work_orders.json public/evidence/work_orders.json
          cp output/demo/condition_windows.lp public/evidence/condition_windows.lp
          cp output/demo/mqtt_outbox.jsonl public/evidence/mqtt_outbox.jsonl
          cp output/demo/opcua_snapshot.json public/evidence/opcua_snapshot.json
          cp output/live/live_monitor_summary.json public/evidence/live_monitor_summary.json
          cp output/live/live_alerts.csv public/evidence/live_alerts.csv
          cp output/live/live_condition_windows.lp public/evidence/live_condition_windows.lp
          cp docs/fmea.md public/docs/fmea.md
          cp docs/fat_protocol.md public/docs/fat_protocol.md
          cp docs/validation_plan.md public/docs/validation_plan.md
          cp docs/traceability_matrix.md public/docs/traceability_matrix.md
          cp docs/evidence_pack.md public/docs/evidence_pack.md
          cp docs/field_validation_protocol.md public/docs/field_validation_protocol.md
          cp docs/interview_walkthrough.md public/docs/interview_walkthrough.md
          cp docs/known_limitations.md public/docs/known_limitations.md
          cp docs/project_completion_status.md public/docs/project_completion_status.md
          cp docs/seeded_fault_root_cause_notes.md public/docs/seeded_fault_root_cause_notes.md
          cp docs/kpi_definition_sheet.md public/docs/kpi_definition_sheet.md
          cp docs/portfolio_project_brief.md public/docs/portfolio_project_brief.md
          cp docs/assets/*.svg public/docs/assets/
          cp docs/observability_stack.md public/docs/observability_stack.md
          cp docs/adr/*.md public/docs/adr/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
