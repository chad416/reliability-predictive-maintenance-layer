apiVersion: 1

datasources:
  - name: InfluxDB Maintenance
    uid: influxdb-maintenance
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET}
      httpMode: POST
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
